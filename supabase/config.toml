# For detailed configuration reference documentation, visit:
# https://supabase.com/docs/guides/local-development/cli/config
project_id = "hnskim"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://hnskim-web.kristian-jackson.workers.dev"
additional_redirect_urls = [
  "https://hnskim-web.kristian-jackson.workers.dev/auth/confirm",
  "https://hnskim-web.kristian-jackson.workers.dev/auth/callback",
  "http://127.0.0.1:5173/auth/confirm",
  "http://localhost:5173/auth/confirm",
  "http://127.0.0.1:5173/auth/callback",
  "http://localhost:5173/auth/callback"
]

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[edge_runtime]
enabled = true
policy = "per_worker"

[analytics]
enabled = true
port = 54327
